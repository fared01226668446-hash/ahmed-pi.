<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - Pi App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top: 50px; background-color: #f4f4f4; font-family: Arial, sans-serif;">

    <div style="background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 90%; max-width: 400px;">
        <h2 style="color: #673ab7;">مكتب الفريد</h2>
        <p>مشروع التداول الآلي - شبكة Pi</p>
        <hr style="border: 0.5px solid #eee;">
        
        <button id="login-btn" onclick="login()" style="background-color: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 10px;">
            تسجيل الدخول عبر Pi
        </button>

        <h4 id="status" style="margin-top: 20px; color: #555;">في انتظار تسجيل الدخول...</h4>
    </div>

    <script>
        // تهيئة التطبيق
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        async function login() {
            const statusLabel = document.getElementById("status");
            statusLabel.innerText = "جاري التحقق من حسابك...";
            statusLabel.style.color = "blue";

            try {
                const scopes = ['username', 'payments'];
                
                const onIncompletePaymentFound = (payment) => {
                    console.log("Incomplete payment found", payment);
                };

                // طلب تسجيل الدخول
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusLabel.innerText = "مرحباً بك يا برنس: " + auth.user.username;
                statusLabel.style.color = "green";
                
                console.log("تم تسجيل الدخول بنجاح!");

            } catch (err) {
                statusLabel.innerText = "فشل الدخول: " + err.message;
                statusLabel.style.color = "red";
                console.error(err);
            }
        }
    </script>
</body>
</html>

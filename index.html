<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - Pi App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top: 50px; background-color: #f4f4f4; font-family: Arial, sans-serif;">

    <div style="background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 80%;">
        <h2 style="color: #673ab7;">مكتب الفريد</h2>
        <p>مشروع التداول - شبكة باي</p>
        
        <button id="login-btn" onclick="login()" style="background-color: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer;">
            تسجيل الدخول عبر Pi
        </button>

        <h4 id="status" style="margin-top: 20px; color: #555;">في انتظار الاتصال بـ Pi Browser...</h4>
    </div>

    <script>
        // تهيئة تطبيق Pi
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false }); 

        async function login() {
            const statusLabel = document.getElementById('status');
            statusLabel.innerText = "جاري التحقق من الحساب...";

            try {
                // طلب تسجيل الدخول من المستخدم
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) { /* معالجة المدفوعات غير المكتملة */ }

                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusLabel.innerText = "مرحباً بك: " + auth.user.username;
                statusLabel.style.color = "green";
                
                // هنا يمكنك توجيه المستخدم لصفحة التداول بعد الدخول بنجاح
                // window.location.href = "trading.html"; 

            } catch (err) {
                statusLabel.innerText = "خطأ في تسجيل الدخول: " + err.message;
                statusLabel.style.color = "red";
                console.error(err);
            }
        }
    </script>
</body>
</html>

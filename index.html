    // حاولنا هنا تشغيل الـ SDK بدون وضع الـ sandbox لتجربة الدخول الفعلي
    Pi.init({ version: "2.0" }); 

    async function login() {
        try {
            const scopes = ['username', 'payments'];
            const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
            alert("مرحباً: " + auth.user.username);
        } catch (err) {
            console.error(err);
            alert("حدث خطأ: تأكد من فتح الرابط داخل متصفح Pi Browser");
        }
    }

</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب خدمات التداول</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; border: 2px solid #673ab7; }
        h1 { color: #673ab7; font-size: 22px; }
        .btn { background-color: #673ab7; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        /* الكلمة باللون الأزرق زي ما طلبت يا باشا */
        #status { margin-top: 15px; font-size: 16px; color: blue; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h1>مكتب خدمات التداول</h1>
    <p>المنصة المعتمدة للتداول الآلي</p>
    <button class="btn" onclick="login()">دخول عبر شبكة Pi</button>
    <div id="status">جاري الاتصال بالشبكة...</div>
</div>
<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });
    async function login() {
        const status = document.getElementById('status');
        try {
            const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
            status.innerHTML = "✅ مرحباً: " + auth.user.username;
            status.style.color = "green";
        } catch (err) {
            status.innerHTML = "❌ فشل الاتصال.. تأكد من متصفح Pi";
            status.style.color = "red";
        }
    }
    function onIncompletePaymentFound(payment) { console.log(payment); }
</script>
</body>
</html>

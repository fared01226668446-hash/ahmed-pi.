<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #673ab7; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 25px; }
        .btn { background-color: #673ab7; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background-color: #512da8; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>مكتب الفريد</h1>
        <p>منصة التداول الآلي الذكية</p>
        <hr style="border: 0.1px solid #eee; margin-bottom: 20px;">
        
        <button id="login-btn" class="btn" onclick="login()">تسجيل الدخول عبر Pi</button>
        
        <div id="status">في انتظار الاتصال...</div>
    </div>

    <script>
        const Pi = window.Pi;
        // ملاحظة: تم ضبط sandbox على true لأن تطبيقك في وضع Testnet
        Pi.init({ version: "2.0", sandbox: true });

        async function login() {
            const statusDiv = document.getElementById("status");
            const loginBtn = document.getElementById("login-btn");
            
            statusDiv.innerText = "جاري الاتصال بالشبكة...";
            statusDiv.style.color = "blue";

            try {
                const scopes = ['username', 'payments'];
                const onIncompletePaymentFound = (payment) => { /* معالجة المدفوعات المعلقة */ };

                // بدء عملية التوثيق
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                statusDiv.innerText = "أهلاً بك يا هندسة: " + auth.user.username;
                statusDiv.style.color = "green";
                loginBtn.style.display = "none"; // إخفاء الزر بعد النجاح
                
                console.log("تم تسجيل الدخول بنجاح!");

            } catch (err) {
                statusDiv.innerText = "فشل الدخول. تأكد من إعدادات الـ Origin";
                statusDiv.style.color = "red";
                console.error("Error details:", err);
            }
        }
    </script>
</body>
</html>

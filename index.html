<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتب الفريد</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body style="text-align:center; padding-top: 50px; background-color: #f4f4f4; font-family: Arial, sans-serif;">

    <div style="background: white; padding: 25px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 85%;">
        <h2 style="color: #673ab7;">مكتب الفريد</h2>
        <p>مشروع التداول الآلي - شبكة Pi</p>
        <p style="font-size: 12px; color: #888;">الرابط: fared01226668446-hash</p>
        
        <button id="login-btn" onclick="login()" style="background-color: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%;">
            تسجيل الدخول عبر Pi
        </button>

        <h4 id="status" style="margin-top: 20px; color: #555;">في انتظار الاتصال بـ Pi Browser...</h4>
    </div>

    <script>
        // تهيئة الـ SDK
        const Pi = window.Pi;
        
        // ملاحظة: وضعنا sandbox: false لأنك ستجربه داخل Pi Browser الحقيقي
        try {
            Pi.init({ version: "2.0", sandbox: false });
            document.getElementById('status').innerText = "متصل بـ Pi Browser";
        } catch (e) {
            document.getElementById('status').innerText = "يرجى الفتح من داخل Pi Browser فقط";
        }

        async function login() {
            const statusLabel = document.getElementById('status');
            statusLabel.innerText = "جاري التحقق من حسابك...";

            try {
                // طلب الصلاحيات الأساسية
                const scopes = ['username', 'payments'];
                
                function onIncompletePaymentFound(payment) {
                    console.log("دفعة غير مكتملة");
                };

                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                // رسالة النجاح
                statusLabel.innerText = "مرحباً بك يا سيد: " + auth.user.username;
                statusLabel.style.color = "green";
                
                // هنا يكتمل الدخول بنجاح
            } catch (err) {
                statusLabel.innerText = "خطأ في الدخول: " + err.message;
                statusLabel.style.color = "red";
                console.error(err);
            }
        }
    </script>
</body>
</html>

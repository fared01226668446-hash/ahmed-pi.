<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Trading Dashboard</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #673ab7; color: white; padding: 20px; text-align: center; }
        .balance-card { padding: 30px; text-align: center; border-bottom: 1px solid #eee; }
        .balance-amount { font-size: 32px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        .actions { display: flex; justify-content: space-around; padding: 20px; background: #fafafa; }
        .btn { border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 45%; }
        .btn-buy { background: #2ecc71; color: white; }
        .btn-sell { background: #e74c3c; color: white; }
        .btn:active { transform: scale(0.95); }
        #user-info { padding: 15px; text-align: center; color: #666; font-size: 14px; }
        .status-dot { height: 10px; width: 10px; background-color: #2ecc71; border-radius: 50%; display: inline-block; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🚀 منصة تداول الفارس</h2>
        <div id="connection-status"><span class="status-dot"></span> متصل بشبكة Pi</div>
    </div>

    <div class="balance-card">
        <div>رصيدك التجريبي (Test Pi)</div>
        <div class="balance-amount" id="balance">100.00</div>
        <div id="user-display">يرجى تسجيل الدخول أولاً</div>
    </div>

    <div class="actions">
        <button class="btn btn-buy" onclick="trade('buy')">شراء</button>
        <button class="btn btn-sell" onclick="trade('sell')">بيع</button>
    </div>

    <div id="user-info">
        <button id="login-btn" style="background: #673ab7; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">دخول باستخدام Pi</button>
    </div>
</div>

<script>
    const Pi = window.Pi;
    let userBalance = 100.00;
    Pi.init({ version: "2.0", sandbox: true });

    // وظيفة تسجيل الدخول
    document.getElementById('login-btn').addEventListener('click', async () => {
        try {
            const auth = await Pi.authenticate(['username', 'payments'], (payment) => {});
            document.getElementById('user-display').innerText = "أهلاً، " + auth.user.username;
            document.getElementById('login-btn').style.display = 'none';
        } catch (error) {
            alert("فشل تسجيل الدخول: " + error.message);
        }
    });

    // وظيفة أزرار التداول
    function trade(type) {
        if (type === 'buy') {
            userBalance += 10.5;
            alert("تمت عملية الشراء بنجاح! +10.5 Pi");
        } else {
            if (userBalance >= 10) {
                userBalance -= 10;
                alert("تمت عملية البيع بنجاح! -10 Pi");
            } else {
                alert("رصيدك غير كافي!");
            }
        }
        document.getElementById('balance').innerText = userBalance.toFixed(2);
    }
</script>

</body>
</html>

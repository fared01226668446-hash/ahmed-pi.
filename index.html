<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trading Test</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0ebf8; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #673ab7; font-size: 24px; }
        .btn-main { background-color: #673ab7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-main:disabled { background-color: #ccc; cursor: not-allowed; }
        #status-text { color: #555; margin-bottom: 20px; font-weight: bold; }
        .trading-panel { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .stat-box { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Trading Test 🚀</h1>
    <p id="status-text">جاري بدء الاتصال...</p>
    
    <button id="login-btn" class="btn-main" disabled onclick="loginWithPi()">انتظر ثواني...</button>

    <div id="trading-panel" class="trading-panel">
        <div class="stat-box">الرصيد التجريبي: <span id="balance">100 IRRA</span></div>
        <p>مرحباً بك في لوحة التداول</p>
    </div>
</div>

<script>
    const Pi = window.Pi;
    const loginBtn = document.getElementById('login-btn');
    const statusText = document.getElementById('status-text');

    // وظيفة ذكية للاتصال بالشبكة مع إعادة محاولة تلقائية
    function startPiConnection() {
        statusText.innerText = "جاري الاتصال بـ Pi Network...";
        statusText.style.color = "#673ab7";

        Pi.init({ version: "1.5" }).then(() => {
            console.log("Success!");
            loginBtn.disabled = false;
            loginBtn.innerText = "تسجيل الدخول باستخدام باي";
            statusText.innerText = "الشبكة جاهزة الآن ✅";
            statusText.style.color = "green";
        }).catch((err) => {
            console.error(err);
            statusText.innerText = "فشل الاتصال.. سأحاول مجدداً خلال 3 ثواني";
            statusText.style.color = "red";
            // إعادة المحاولة بعد 3 ثواني لضمان تخطي الخطأ
            setTimeout(startPiConnection, 3000);
        });
    }

    // بدء العملية فور تحميل الصفحة
    startPiConnection();

    async function loginWithPi() {
        try {
            const scopes = ['username', 'payments'];
            const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
            
            loginBtn.style.display = 'none';
            document.getElementById('trading-panel').style.display = 'block';
            statusText.innerHTML = "أهلاً بك يا <b>" + user.user.username + "</b>";
        } catch (err) {
            alert("خطأ: تأكد من فتح الرابط داخل متصفح Pi");
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("Incomplete Payment found", payment);
    };
</script>

</body>
</html>
